    <h1>Exercício 08: Galeria de Fotos usando a lib SimpleLightbox</h1>
    <p>Site oficial: <a href="https://simplelightbox.js.org/" target="_blank">SimpleLightbox</a></p>

    <p><i>Veja a documentação no site oficial e, seguindo as instruções, monte a estrutura necessária para implementar uma galeria de imagens.</i></p>

    <hr>



    <div class="slider splide">
        <div class="splide__track">
            <ul class="splide__list gallery">
                <li class="splide__slide">
                    <figure >
                        <a href="./imagens/grande1.jpg">
                        <img src="./imagens/thumb1.jpg" alt="" title="Beautiful Image">
                        </a>
                        <figcaption>Tower Bridge</figcaption>
                    </figure>
                </li>
                <li class="splide__slide">
                    <figure>
                        <a href="./imagens/grande1.jpg">
                        <img src="./imagens/thumb2.jpg" alt="" title="Céu estrelado">
                        </a>
                        <figcaption>Hotel PARKROYAL COLLECTION Pickering</figcaption>
                    </figure>
                </li>
                <li class="splide__slide">
                    <figure>
                        <a href="./imagens/grande3.jpg">
                        <img src="./imagens/thumb3.jpg" alt="" title="Falésia e praia em formato de baía">
                        </a>
                        <figcaption>Horizonte (skyline) de Ho Chi Minh </figcaption>
                    </figure>
                </li>
                <li class="splide__slide">
                    <figure>
                        <a href="./imagens/grande4.jpg">
                        <img src="./imagens/thumb4.jpg" alt="" title="Trem passando por montanhas verdes">
                        </a>
                        <figcaption>Complexo Raffles City Chongqing</figcaption>
                    </figure>
                </li>
                <li class="splide__slide">
                    <figure>
                        <a href="./imagens/grande5.jpg">
                        <img src="./imagens/thumb5.jpg" alt="" title="Sol vermelho">
                        </a>
                        <figcaption>Complexo Raffles City Chongqing</figcaption>
                    </figure>
                </li>
                <li class="splide__slide">
                    <figure>
                        <a href="./imagens/grande6.jpg">
                        <img src="./imagens/thumb6.jpg" alt="" title="Terraços verdes">
                        </a>
                        <figcaption>Complexo Raffles City Chongqing</figcaption>
                    </figure>
                </li>
            </ul>
        </div>
