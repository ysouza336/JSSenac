<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício DOM + Eventos</title>
    <style>
        *,*::before,*::after { box-sizing: border-box; }

        body {
            font-family: system-ui, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
        }

        .resultado{
            background-color: #f4f4f4;
            color: black;
            text-align: center;
            padding: 15px;
        }
        button{
            color: #fff;
            background-color: #337ab7;
            border-color: #2e6da4;
            padding: 0.75rem;
            border: none;
            border-radius: 12px;
        }
        .aprovado{
            color: blue;
            font-weight: bold;
        }
        .reprovado{
            color: red;
            font-weight: bold;
        }

       
    </style>
</head>

<body>
    <div class="container">
        <h1>Exercício DOM + Eventos</h1>
        <section>
            <h2>Calculadora de Média</h2>
            <form id="form-media" action="" method="post">
                <p>
                    <label  for="nota1">Nota 1:</label>
                    <input name="nota1" id="nota1" type="number" required min="0" max="10" step="0.01">

                    <label for="nota2">Nota 2:</label>
                    <input name="nota2" id="nota2" type="number" required min="0" max="10" step="0.01">
                </p>
                <button type="submit" id="calcular">Calcular Média</button>
            </form>
        </section>

        <section>
            <h2>Resultados</h2>
            <div id="situacao">
                <!-- <p id="media"></p>
                <p id="resultado"></p> -->
            </div>
        </section>

    </div>


    
    <script src="exercicio07.js"></script>
</body>

</html>
